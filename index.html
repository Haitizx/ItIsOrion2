<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>É o Órion?</title>
  <link rel="stylesheet" href="./style.css" />
</head>
<body>
  <main class="stage">
    <section class="panel">
      <div class="mark" aria-hidden="true"></div>

      <h1 class="title">PGP Verify</h1>
      <p class="subtitle">Cole abaixo a mensagem assinada do Órion (cleartext). A verificação roda localmente no seu navegador.</p>

      <div class="field">
        <label for="blob">Mensagem assinada</label>
        <textarea id="blob" spellcheck="false" placeholder="-----BEGIN PGP SIGNED MESSAGE-----
Hash: SHA512

..."></textarea>
      </div>

      <div class="actions">
        <button class="btn" id="verify">Verificar</button>
      </div>

      <section class="result" aria-live="polite">
        <div class="status" id="status">Cole e clique em “Verificar”.</div>
        <pre class="meta" id="meta"></pre>
      </section>
    </section>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
